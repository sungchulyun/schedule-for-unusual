server:
  port: ${SERVER_PORT:8080}
  address: 0.0.0.0
  forward-headers-strategy: framework

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:3306/${DB_NAME}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:10}
      minimum-idle: ${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:2}
      connection-timeout: ${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:30000}
      validation-timeout: ${SPRING_DATASOURCE_HIKARI_VALIDATION_TIMEOUT:5000}
      max-lifetime: 1800000
      idle-timeout: 600000

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    properties:
      hibernate:
        format_sql: false
    open-in-view: false

  h2:
    console:
      enabled: false

app:
  auth:
    jwt:
      issuer: ${APP_AUTH_JWT_ISSUER:schedule-api}
      secret: ${APP_AUTH_JWT_SECRET}
      access-token-expiry-seconds: ${APP_AUTH_JWT_ACCESS_TOKEN_EXPIRY_SECONDS:3600}
      refresh-token-expiry-seconds: ${APP_AUTH_JWT_REFRESH_TOKEN_EXPIRY_SECONDS:1209600}

    kakao:
      client-id: ${APP_AUTH_KAKAO_CLIENT_ID}
      client-secret: ${APP_AUTH_KAKAO_CLIENT_SECRET:}
      redirect-uri: ${APP_AUTH_KAKAO_REDIRECT_URI}