name: Backend CI/CD

on:
  push:
    branches: [ "main" ]
    paths:
      - "schedule-api/**"

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: schedule-api

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: JDK 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle 권한 부여
        run: chmod +x ./gradlew

      - name: Gradle 빌드
        run: ./gradlew build

      # 🔥 Docker 로그인
      - name: Docker 로그인
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 🔥 Docker 이미지 빌드
      - name: Docker build
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/schedule-backend:latest .

      # 🔥 Docker Hub push
      - name: Docker push
        run: docker push ${{ secrets.DOCKER_USERNAME }}/schedule-backend:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: 서버 배포 (SSH)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "🚀 배포 시작"

            docker pull ${{ secrets.DOCKER_USERNAME }}/schedule-backend:latest

            docker stop backend || true
            docker rm backend || true

            docker run -d \
              --name backend \
              --network app_default \
              -p 8080:8080 \
              -e SPRING_PROFILES_ACTIVE=${{ secrets.SPRING_PROFILES_ACTIVE }} \
              -e DB_HOST=${{ secrets.DB_HOST }} \
              -e DB_NAME=${{ secrets.DB_NAME }} \
              -e SPRING_DATASOURCE_USERNAME=${{ secrets.SPRING_DATASOURCE_USERNAME }} \
              -e SPRING_DATASOURCE_PASSWORD=${{ secrets.SPRING_DATASOURCE_PASSWORD }} \
              -e APP_AUTH_JWT_SECRET=${{ secrets.APP_AUTH_JWT_SECRET }} \
              -e APP_AUTH_KAKAO_CLIENT_ID=${{ secrets.APP_AUTH_KAKAO_CLIENT_ID }} \
              -e APP_AUTH_KAKAO_REDIRECT_URI=${{ secrets.APP_AUTH_KAKAO_REDIRECT_URI }} \
              ${{ secrets.DOCKER_USERNAME }}/schedule-backend:latest

            echo "✅ 배포 완료"
